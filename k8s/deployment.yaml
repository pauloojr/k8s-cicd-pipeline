apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx
  namespace: cicd

spec:

  replicas: 1

  selector:
    matchLabels:
      app: nginx

  template:

    metadata:
      labels:
        app: nginx

    spec:

      containers:

      - name: nginx

        image: ghcr.io/pauloojr/k8s-cicd-pipeline:latest

        imagePullPolicy: Always

        ports:

        - containerPort: 80