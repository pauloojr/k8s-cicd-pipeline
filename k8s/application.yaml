apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: cicd-pipeline
  namespace: argocd

spec:

  project: default

  source:

    repoURL: https://github.com/pauloojr/k8s-cicd-pipeline.git

    targetRevision: main

    path: k8s

  destination:

    server: https://kubernetes.default.svc

    namespace: cicd

  syncPolicy:

    automated:

      prune: true

      selfHeal: true

    syncOptions:

      - CreateNamespace=true