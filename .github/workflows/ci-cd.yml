name: CI/CD Kubernetes Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write
  security-events: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ghcr.io/pauloojr/k8s-cicd-pipeline:${IMAGE_TAG} .
          docker tag ghcr.io/pauloojr/k8s-cicd-pipeline:${IMAGE_TAG} ghcr.io/pauloojr/k8s-cicd-pipeline:latest

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/pauloojr/k8s-cicd-pipeline:${{ env.IMAGE_TAG }}
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

      - name: Push Docker image
        run: |
          docker push ghcr.io/pauloojr/k8s-cicd-pipeline:${IMAGE_TAG}
          docker push ghcr.io/pauloojr/k8s-cicd-pipeline:latest

      - name: Update Kubernetes manifest image tag
        run: |
          sed -i "s|ghcr.io/pauloojr/k8s-cicd-pipeline:.*|ghcr.io/pauloojr/k8s-cicd-pipeline:${IMAGE_TAG}|g" k8s/deployment.yaml

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "ci: update image tag to ${IMAGE_TAG}" || echo "No changes to commit"
          git push